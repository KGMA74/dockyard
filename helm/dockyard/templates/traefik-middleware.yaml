{{- if and .Values.ingress.enabled (eq .Values.ingress.className "traefik") }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "dockyard.fullname" . }}-registry
  labels:
    {{- include "dockyard.labels" . | nindent 4 }}
spec:
  buffering:
    maxRequestBodyBytes: 0
    memRequestBodyBytes: 10485760
    maxResponseBodyBytes: 0
{{- end }}
