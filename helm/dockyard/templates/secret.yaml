{{- if not .Values.auth.existingSecret }}
{{- $secretName := include "dockyard.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $jwtSecret := .Values.auth.jwtSecret }}
{{- if not $jwtSecret }}
  {{- if and $existing (index $existing.data "JWT_SECRET") }}
    {{- $jwtSecret = index $existing.data "JWT_SECRET" | b64dec }}
  {{- else }}
    {{- $jwtSecret = randAlphaNum 32 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "dockyard.labels" . | nindent 4 }}
stringData:
  JWT_SECRET: {{ $jwtSecret | quote }}
  AUTH_PASSWORD: {{ .Values.auth.password | quote }}
  S3_ACCESS_KEY: {{ .Values.registry.s3.accessKey | quote }}
  S3_SECRET_KEY: {{ .Values.registry.s3.secretKey | quote }}
  REGISTRY_PASSWORD: {{ .Values.registry.proxy.password | quote }}
{{- end }}
