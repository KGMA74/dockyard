apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dockyard.fullname" . }}
  labels:
    {{- include "dockyard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dockyard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "dockyard.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "dockyard.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dockyard
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "dockyard.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "dockyard.fullname" . }}
            - secretRef:
                name: {{ include "dockyard.secretName" . }}
          {{- $tlsOn := ne ((.Values.tls).mode | default "off") "off" }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
              {{- if $tlsOn }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
              {{- if $tlsOn }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $localPVC := and (eq .Values.registry.storage.backend "local") .Values.persistence.enabled }}
          {{- $tlsSecret := (.Values.tls).existingCertSecret }}
          {{- $cosignSecret := (.Values.signing).publicKeysSecret }}
          {{- if or $localPVC $tlsSecret $cosignSecret }}
          volumeMounts:
            {{- if $localPVC }}
            - name: registry-data
              mountPath: {{ .Values.registry.storage.path }}
            {{- end }}
            {{- if $tlsSecret }}
            - name: tls-cert
              mountPath: /etc/dockyard-tls
              readOnly: true
            {{- end }}
            {{- if $cosignSecret }}
            - name: cosign-keys
              mountPath: /etc/dockyard-cosign-keys
              readOnly: true
            {{- end }}
          {{- end }}
      {{- $localPVC := and (eq .Values.registry.storage.backend "local") .Values.persistence.enabled }}
      {{- $tlsSecret := (.Values.tls).existingCertSecret }}
      {{- $cosignSecret := (.Values.signing).publicKeysSecret }}
      {{- if or $localPVC $tlsSecret $cosignSecret }}
      volumes:
        {{- if $localPVC }}
        - name: registry-data
          persistentVolumeClaim:
            claimName: {{ include "dockyard.pvcName" . }}
        {{- end }}
        {{- if $tlsSecret }}
        - name: tls-cert
          secret:
            secretName: {{ $tlsSecret }}
        {{- end }}
        {{- if $cosignSecret }}
        - name: cosign-keys
          secret:
            secretName: {{ $cosignSecret }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
