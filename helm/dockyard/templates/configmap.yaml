apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dockyard.fullname" . }}
  labels:
    {{- include "dockyard.labels" . | nindent 4 }}
data:
  PORT: "8080"
  REGISTRY_MODE: {{ .Values.registry.mode | quote }}
  REGISTRY_STORAGE_BACKEND: {{ .Values.registry.storage.backend | quote }}
  REGISTRY_STORAGE_PATH: {{ .Values.registry.storage.path | quote }}
  S3_ENDPOINT: {{ .Values.registry.s3.endpoint | quote }}
  S3_BUCKET: {{ .Values.registry.s3.bucket | quote }}
  S3_REGION: {{ .Values.registry.s3.region | quote }}
  S3_SECURE: {{ .Values.registry.s3.secure | quote }}
  AUTH_USERNAME: {{ .Values.auth.username | quote }}
  V2_AUTH_ENABLED: {{ .Values.auth.v2Enabled | toString | quote }}
  V2_ANONYMOUS_PULL: {{ .Values.auth.v2AnonymousPull | default false | toString | quote }}
  REGISTRY_URL: {{ .Values.registry.proxy.url | quote }}
  REGISTRY_USERNAME: {{ .Values.registry.proxy.username | quote }}
  TLS_MODE: {{ (.Values.tls).mode | default "off" | quote }}
  TLS_DOMAIN: {{ (.Values.tls).domain | default "" | quote }}
  TLS_ACME_EMAIL: {{ (.Values.tls).acmeEmail | default "" | quote }}
  {{- if (.Values.tls).existingCertSecret }}
  TLS_CERT_FILE: "/etc/dockyard-tls/tls.crt"
  TLS_KEY_FILE: "/etc/dockyard-tls/tls.key"
  {{- end }}
