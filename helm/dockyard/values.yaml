replicaCount: 1

image:
  repository: ghcr.io/kgma74/dockyard
  pullPolicy: Always
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

registry:
  # embedded: Dockyard is the registry (blobs stored locally or on S3)
  # proxy: Dockyard forwards /v2/* to an upstream registry
  mode: embedded

  storage:
    backend: local  # local | s3
    path: /data/registry

  s3:
    endpoint: ""
    bucket: "dockyard-registry"
    region: "us-east-1"
    secure: "true"
    accessKey: ""
    secretKey: ""

  proxy:
    url: ""
    username: ""
    password: ""

auth:
  username: admin
  password: "changeme"
  # Auth on /v2/* endpoints (Docker token auth + Basic fallback).
  # BREAKING: the application default flipped to true with the RBAC release —
  # this chart pins it explicitly. Set to false for an open registry.
  v2Enabled: true
  # Allow unauthenticated pulls while pushes still require login
  # (public-read registry). Only relevant when v2Enabled is true.
  v2AnonymousPull: false
  # JWT secret: auto-generated on first install, preserved across upgrades.
  # Set explicitly to override auto-generation.
  jwtSecret: ""
  # Name of an existing Secret that already contains jwt-secret and auth-password
  # (and optionally s3-access-key, s3-secret-key, registry-password).
  # When set, no Secret is created by this chart.

serviceAccount:
  # Create a dedicated ServiceAccount (no extra permissions granted).
  create: true
  # Override the generated name, or set create=false and name to use an
  # existing one ("" + create=false → "default").
  name: ""
  annotations: {}

metrics:
  serviceMonitor:
    # Requires the Prometheus Operator CRDs (kube-prometheus-stack).
    # Dockyard itself serves /metrics whenever METRICS_ENABLED=true.
    enabled: false
    interval: 30s
    # Extra labels for Prometheus instance selection (e.g. release: kps).
    labels: {}

signing:
  # Signed-push enforcement: verifies cosign signatures against configured
  # public keys. Signing itself always happens client-side (cosign CLI) —
  # Dockyard never holds private keys, and does not support keyless
  # (Fulcio/Rekor) verification.
  enabled: false
  # Name of an existing Secret whose keys (one or more *.pem files) get
  # mounted read-only and scanned for public keys to verify against.
  publicKeysSecret: ""

scan:
  # Vulnerability scanning: Dockyard shells out to a `trivy` binary bundled in
  # its own image. Standalone by default (empty trivyServerURL) — trivy
  # manages its own vulnerability DB, downloaded and cached under cacheDir on
  # first scan (needs outbound internet access from the Dockyard pod). Set
  # trivyServerURL to defer to a shared/external `trivy server --listen`
  # deployment instead (mutualized DB across instances, or air-gapped setups
  # where Dockyard itself has no internet egress) — Dockyard never runs or
  # manages Trivy itself in that case.
  enabled: false
  trivyServerURL: ""
  # Empty = computed automatically under the storage volume
  # (<registry.storage.path>/trivy-cache). Override only if you need the
  # cache on a different persistent path.
  cacheDir: ""
  timeout: "5m"
  maxReportBytes: 20971520
  dedupWindow: "1h"
  # trivy pulls the scanned image from Dockyard's own /v2 endpoint on
  # localhost, which is plain HTTP unless tls.mode below is set.
  insecureRegistry: true

tls:
  # off | static | self-signed | acme — served natively by Dockyard.
  # "static" expects existingCertSecret below; "acme" needs the pod reachable
  # from the internet on :443 (TLS-ALPN challenge) and domain set.
  mode: "off"
  domain: ""
  acmeEmail: ""
  # kubernetes.io/tls Secret (tls.crt / tls.key) mounted read-only; implies
  # TLS_CERT_FILE/TLS_KEY_FILE when mode=static.
  existingCertSecret: ""
  existingSecret: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  # Set className to "traefik" (k3s default) or "nginx".
  # Traefik streams request/response bodies by default — no middleware needed
  # (a buffering Middleware was tried here before but broke large blob PUTs
  # and SSE, since it fully buffers both directions before proxying).
  # For nginx-ingress, set className: "nginx" and add these annotations:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "0"
  #   nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  #   nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
  className: ""
  annotations: {}
  certManager:
    # Cluster-issuer name (e.g. "letsencrypt-prod") — adds the
    # cert-manager.io/cluster-issuer annotation automatically and requires
    # cert-manager to already be installed in the cluster. Leave empty to
    # manage the annotation/secret yourself (or use tls.mode=acme instead,
    # which needs no ingress controller or cert-manager at all).
    clusterIssuer: ""
  hosts:
    - host: registry.example.com
      paths:
        - path: /
          pathType: Prefix
  # With certManager.clusterIssuer set, add a matching entry here so
  # cert-manager knows which Secret to populate, e.g.:
  #   - secretName: dockyard-tls
  #     hosts: [registry.example.com]
  tls: []

# Horizontal Pod Autoscaler. Requires the metrics-server (or another
# custom-metrics provider) in the cluster. Gated on S3 storage: local
# storage uses a ReadWriteOnce PVC that only one pod can mount, so scaling
# beyond 1 replica would either fail to schedule or split traffic across
# pods with inconsistent local state — this chart refuses to render the HPA
# otherwise (see templates/hpa.yaml).
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
  # Empty = no memory-based scaling target.
  targetMemoryUtilizationPercentage: ""

# PodDisruptionBudget — protects against voluntary disruptions (node drains,
# cluster upgrades) evicting too many replicas at once. Only one of
# minAvailable/maxUnavailable should be set; minAvailable takes precedence.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# Liveness/readiness probe tuning. Defaults match what the chart has always
# used; override for slower storage backends (S3) or resource-constrained
# nodes where the defaults are too aggressive.
probes:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3

# Persistent volume for local storage backend.
# Ignored when registry.storage.backend=s3.
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  existingClaim: ""

resources: {}

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}
