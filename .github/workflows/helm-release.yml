
name: Helm Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=${OWNER,,}" >> $GITHUB_ENV

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Install yq
        run: |
          sudo curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Populate Artifact Hub changelog from the GitHub release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(gh release view "$GITHUB_REF_NAME" --json body -q .body 2>/dev/null || true)
          CHANGES=""
          while IFS= read -r line; do
            case "$line" in
              "* "*|"- "*)
                text="${line#??}"
                text="${text//\"/\\\"}"
                CHANGES="${CHANGES}$(printf -- '- kind: changed\n  description: "%s"' "$text")"$'\n'
                ;;
            esac
          done <<< "$NOTES"
          if [ -z "$CHANGES" ]; then
            CHANGES=$(printf -- '- kind: changed\n  description: "Release %s"\n' "$GITHUB_REF_NAME")
          fi
          export CHANGES
          yq e -i '.annotations."artifacthub.io/changes" = strenv(CHANGES)' helm/dockyard/Chart.yaml

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package chart
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          helm package helm/dockyard \
            --version "$VERSION" \
            --app-version "$VERSION"

      - name: Push chart to GHCR
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          helm push "dockyard-${VERSION}.tgz" oci://ghcr.io/${OWNER}/charts

      - name: Push Artifact Hub metadata
        run: |
          oras push ghcr.io/${OWNER}/charts/dockyard:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
