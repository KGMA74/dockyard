name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: Test
        run: go test ./... -race -cover

      - name: Fuzz smoke test (manifest parsing)
        run: |
          go test ./internal/admin/... -fuzz FuzzParseManifestDetails -fuzztime 20s
          go test ./internal/admin/... -fuzz FuzzDiffManifests -fuzztime 20s

  multiarch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dockyard
        run: go build -o dockyard ./cmd/dockyard

      - name: Start dockyard (embedded, local storage, insecure)
        run: |
          REGISTRY_STORAGE_BACKEND=local REGISTRY_STORAGE_PATH=/tmp/dockyard-data \
          AUTH_USERNAME=admin AUTH_PASSWORD=changeme123 JWT_SECRET=ci-smoke-test-secret \
          PORT=5000 \
          ./dockyard &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health; then exit 0; fi
            sleep 1
          done
          echo "dockyard never became healthy on :5000" >&2
          exit 1

      - name: Configure Docker for the insecure local registry
        run: |
          echo '{"insecure-registries":["localhost:5000"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Log in
        run: docker login localhost:5000 -u admin -p changeme123

      - name: Build and push a multi-arch image (linux/amd64 + linux/arm64)
        run: |
          # --driver-opt network=host: the docker-container driver otherwise
          # runs BuildKit in its own container on the default bridge network,
          # where "localhost:5000" doesn't resolve to the runner's dockyard.
          docker buildx create --use --driver-opt network=host
          cat > Dockerfile.multiarch-smoke <<'EOF'
          FROM alpine:3.20
          RUN echo "dockyard multi-arch CI smoke test" > /marker.txt
          EOF
          docker buildx build --platform linux/amd64,linux/arm64 \
            -f Dockerfile.multiarch-smoke \
            -t localhost:5000/ci/multiarch-smoke:latest \
            --push .

      - name: Pull each platform and verify the manifest list
        run: |
          docker pull --platform linux/amd64 localhost:5000/ci/multiarch-smoke:latest
          docker pull --platform linux/arm64 localhost:5000/ci/multiarch-smoke:latest

          HTTP_STATUS=$(curl -s -u admin:changeme123 -o body.json -w "%{http_code}" \
            "http://localhost:5000/v2/ci/multiarch-smoke/manifests/latest" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.index.v1+json")
          echo "GET manifest list -> HTTP $HTTP_STATUS"
          cat body.json
          echo
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "expected HTTP 200, got $HTTP_STATUS" >&2
            exit 1
          fi
          if ! grep -q '"architecture":[[:space:]]*"arm64"' body.json; then
            echo "no arm64 platform entry found in the manifest list body above" >&2
            exit 1
          fi

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

      - name: Validate OpenAPI spec
        run: npx --yes @redocly/cli@latest lint ../api/openapi.yaml

      - name: Generated API types are in sync
        run: |
          npm run gen-api
          git diff --exit-code -- src/generated
